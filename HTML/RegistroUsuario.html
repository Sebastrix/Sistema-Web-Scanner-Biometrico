<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro Cliente - Linaje</title>
    <link rel="stylesheet" href="/CSS/RegistroUsuario.css">
</head>
<body>

<div class="registro-container">

    <div class="registro-card">

        <div class="logo-box">
            <img src="/IMG/LogoLinaje.png" alt="Linaje">
            <h2>Crear Cuenta Cliente</h2>
            <p>Regístrate con reconocimiento facial para reservar pedidos</p>
        </div>

        <form id="formRegistroUsuario">

            <div class="form-grid">

                <div class="form-group">
                    <label>Usuario</label>
                    <input 
                        type="text" 
                        id="usuario" 
                        placeholder="Ejemplo: cliente01" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label>Celular</label>
                    <input 
                        type="tel" 
                        id="celular" 
                        placeholder="Ejemplo: 987654321" 
                        maxlength="15"
                        required
                    >
                </div>

                <div class="form-group">
                    <label>Nombres</label>
                    <input 
                        type="text" 
                        id="nombres" 
                        placeholder="Ingrese sus nombres" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label>Apellidos</label>
                    <input 
                        type="text" 
                        id="apellidos" 
                        placeholder="Ingrese sus apellidos" 
                        required
                    >
                </div>

            </div>

            <label>Dirección</label>
            <input 
                type="text" 
                id="direccion" 
                placeholder="Ejemplo: Av. Principal 123, Chincha Alta" 
                required
            >

            <label>Referencia</label>
            <input 
                type="text" 
                id="referencia" 
                placeholder="Ejemplo: Frente al parque / Cerca al mercado"
            >

            <div class="form-grid">

                <div class="form-group">
                    <label>Contraseña</label>
                    <input 
                        type="password" 
                        id="contrasena" 
                        placeholder="Ingrese contraseña" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label>Confirmar contraseña</label>
                    <input 
                        type="password" 
                        id="confirmarContrasena" 
                        placeholder="Repita contraseña" 
                        required
                    >
                </div>

            </div>

            <div class="info-rol">
                <div>
                    <span>Rol asignado:</span>
                    <strong>Cliente</strong>
                </div>
                <small>El sistema registrará esta cuenta automáticamente con rol 0.</small>
            </div>

            <div class="scanner-box">
                <h3>Scanner Facial</h3>
                <p class="scanner-text">
                    Activa la cámara, coloca tu rostro al centro y captura la imagen para registrar tu ID facial.
                </p>

                <video id="video" autoplay playsinline></video>
                <canvas id="canvas" style="display: none;"></canvas>

                <div class="scanner-actions">
                    <button type="button" id="btnActivarCamara">
                        Activar cámara
                    </button>

                    <button type="button" id="btnCapturarRostro">
                        Capturar rostro
                    </button>
                </div>

                <img id="previewRostro" alt="Vista previa del rostro">
            </div>

            <p id="mensajeRegistro"></p>

            <button type="submit" class="btn-registrar">
                Crear cuenta
            </button>

        </form>

        <a href="/login" class="volver">Volver al login</a>

    </div>

</div>

<script src="/JS/RegistroUsuario.js"></script>

</body>
</html>
